<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovaDepo • Ana Menü</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #8b5cf6;
    --primary-dark: #6d28d9;
    --accent: #06b6d4;
    --accent-2: #ec4899;
    --success: #10b981;
    --danger: #ef4444;
    --text: #f9fafb;
    --muted: #9ca3af;
    --card-bg: rgba(15, 12, 41, 0.65);
    --card-border: rgba(139, 92, 246, 0.3);
  }

  html, body { height: 100%; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    background: #020014;
    color: var(--text);
    overflow-x: hidden;
    position: relative;
  }

  /* ===== AŞIRI GERÇEKÇİ GALAKSİ ARKA PLANI ===== */
  #galaxy-canvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* ===== ÜST BAR ===== */
  .navbar {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: rgba(2, 0, 20, 0.7);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--card-border);
  }
  .nav-brand { display: flex; align-items: center; gap: 10px; color: white; }
  .nav-brand .logo { font-size: 26px; animation: float 6s ease-in-out infinite; }
  .nav-brand .name { font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .nav-brand .name span { color: var(--accent); }
  @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

  .nav-search { flex: 1; max-width: 380px; margin: 0 24px; position: relative; }
  .nav-search input {
    width: 100%; padding: 9px 14px 9px 36px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
    color: white; font-size: 13px; transition: all 0.25s;
  }
  .nav-search input::placeholder { color: rgba(255,255,255,0.4); }
  .nav-search input:focus { outline: none; background: rgba(255,255,255,0.1); border-color: var(--accent); }
  .nav-search .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.6; }

  .nav-user { display: flex; align-items: center; gap: 14px; }
  .user-chip { display: flex; align-items: center; gap: 8px; color: white; font-size: 13px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    display: flex; align-items: center; justify-content: center;
    color: white; font-weight: 700; font-size: 15px;
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.5);
  }
  .btn-logout {
    padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.4);
    background: rgba(239, 68, 68, 0.1); color: #fca5a5; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(239, 68, 68, 0.25); color: white; border-color: var(--danger); }

  /* ===== İÇERİK ===== */
  .main { 
    position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 30px 24px 60px; 
    transition: all 0.3s ease;
  }
  /* Sürükle Bırak Efekti */
  .main.drag-over {
    outline: 3px dashed var(--accent);
    outline-offset: -10px;
    background: rgba(6, 182, 212, 0.05);
    border-radius: 24px;
  }

  .welcome { color: white; margin-bottom: 24px; }
  .welcome h1 { font-size: 28px; margin-bottom: 6px; }
  .welcome h1 .highlight { 
    background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; 
  }
  .welcome p { font-size: 14px; opacity: 0.8; }

  /* Depolama kartı */
  .storage-card {
    background: var(--card-bg); border-radius: 18px; padding: 22px 26px; margin-bottom: 24px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4); border: 1px solid var(--card-border);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
  }
  .storage-info { flex: 1; min-width: 220px; }
  .storage-info .label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .storage-info .value { font-size: 22px; font-weight: 700; color: white; }
  .storage-info .value span { font-size: 14px; color: var(--muted); font-weight: 500; }
  .progress-track { height: 10px; background: rgba(255,255,255,0.1); border-radius: 6px; margin-top: 12px; overflow: hidden; }
  .progress-fill {
    height: 100%; width: 0; border-radius: 6px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .storage-ring {
    width: 90px; height: 90px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: conic-gradient(var(--primary) 0% 0%, rgba(255,255,255,0.1) 0% 100%);
    transition: background 0.8s ease;
  }
  .storage-ring-inner {
    width: 68px; height: 68px; border-radius: 50%; background: rgba(15, 12, 41, 0.9);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 16px; color: var(--accent);
  }

  /* Hızlı eylemler */
  .section-title { color: white; font-size: 16px; margin: 26px 0 14px; display: flex; align-items: center; gap: 8px; }
  .quick-actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
  .action-btn {
    background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px;
    padding: 18px 16px; cursor: pointer; transition: all 0.25s; text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3); backdrop-filter: blur(8px); color: white;
  }
  .action-btn:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(139, 92, 246, 0.3); border-color: var(--primary); }
  .action-btn:active { transform: translateY(-1px) scale(0.98); }
  .action-btn .icon { font-size: 28px; display: block; margin-bottom: 8px; }
  .action-btn .text { font-size: 13px; font-weight: 600; }

  /* Dosya ızgarası */
  .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .file-card {
    background: var(--card-bg); border: 1px solid rgba(139, 92, 246, 0.15); border-radius: 14px;
    padding: 18px 14px; cursor: pointer; transition: all 0.25s; text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3); position: relative; backdrop-filter: blur(8px);
  }
  .file-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 28px rgba(6, 182, 212, 0.25); border-color: var(--accent); }
  .file-card .file-icon { font-size: 40px; display: block; margin-bottom: 10px; }
  .file-card .file-name { font-size: 13px; font-weight: 600; color: white; word-break: break-word; line-height: 1.3; }
  .file-card .file-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .file-card .badge {
    position: absolute; top: 8px; right: 8px; font-size: 10px; padding: 2px 7px;
    border-radius: 10px; background: rgba(139, 92, 246, 0.2); color: #c4b5fd; font-weight: 600;
  }
  .file-card .delete-btn {
    position: absolute; top: 8px; left: 8px; width: 26px; height: 26px;
    border-radius: 50%; border: none; background: rgba(239, 68, 68, 0.2); 
    color: #fca5a5; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: all 0.2s; font-size: 12px;
  }
  .file-card:hover .delete-btn { opacity: 1; }
  .file-card .delete-btn:hover { background: var(--danger); color: white; }

  @media (max-width: 640px) {
    .nav-search { display: none; }
    .navbar { padding: 12px 16px; }
    .user-chip .user-name { display: none; }
    .welcome h1 { font-size: 22px; }
    .storage-ring { display: none; }
  }

  .toast {
    position: fixed; top: 20px; right: 20px; padding: 14px 20px; 
    background: rgba(15, 12, 41, 0.95); color: white; border: 1px solid var(--card-border);
    border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
    font-size: 14px; z-index: 100; transform: translateX(120%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
    border-left: 4px solid var(--success); max-width: 320px; backdrop-filter: blur(10px);
  }
  .toast.show { transform: translateX(0); }
  .toast.error { border-left-color: var(--danger); }

  /* Gizli dosya inputu */
  #fileInput { display: none; }

  /* Yükleme Animasyonu */
  .loading-overlay {
    position: fixed; inset: 0; background: rgba(2, 0, 20, 0.8); z-index: 999;
    display: none; align-items: center; justify-content: center; flex-direction: column;
    backdrop-filter: blur(5px);
  }
  .loading-overlay.active { display: flex; }
  .spinner {
    width: 40px; height: 40px; border: 4px solid rgba(139, 92, 246, 0.3);
    border-top-color: var(--primary); border-radius: 50%;
    animation: spin 1s linear infinite; margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- GERÇEKÇİ GALAKSİ CANVAS -->
<canvas id="galaxy-canvas"></canvas>

<!-- YÜKLEME EKRANI -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p style="color: white; font-size: 14px;">Dosyalar işleniyor...</p>
</div>

<!-- ÜST BAR -->
<nav class="navbar">
  <div class="nav-brand">
    <span class="logo">🪐</span>
    <span class="name">NOVA<span>DEPO</span></span>
  </div>

  <div class="nav-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Dosya veya klasör ara..." />
  </div>

  <div class="nav-user">
    <div class="user-chip">
      <div class="avatar" id="avatar">N</div>
      <span class="user-name" id="userName">Kullanıcı</span>
    </div>
    <button class="btn-logout" id="logoutBtn">Çıkış 🚪</button>
  </div>
</nav>

<!-- İÇERİK (Sürükle Bırak Alanı) -->
<main class="main" id="dropZone">
  <div class="welcome">
    <h1>Hoş geldin, <span class="highlight" id="welcomeName">Kaptan</span>! 🌌</h1>
    <p>Dosyalarını buraya sürükleyip bırakabilir veya aşağıdaki butonları kullanabilirsin.</p>
  </div>

  <!-- GERÇEK DEPOLAMA KARTI -->
  <div class="storage-card">
    <div class="storage-info">
      <div class="label">☁️ Depolama Alanı</div>
      <div class="value" id="storageValue">0 B <span>/ 10 GB kullanıldı</span></div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="storage-ring" id="storageRing">
      <div class="storage-ring-inner" id="storagePercent">%0</div>
    </div>
  </div>

  <!-- HIZLI EYLEMLER -->
  <h2 class="section-title">⚡ Hızlı Eylemler</h2>
  <div class="quick-actions">
    <button class="action-btn" id="btnUpload"><span class="icon">📤</span><span class="text">Dosya Yükle</span></button>
    <button class="action-btn" id="btnFolder"><span class="icon">📁</span><span class="text">Yeni Klasör</span></button>
    <button class="action-btn" id="btnSort"><span class="icon">🔃</span><span class="text">Sırala (A-Z)</span></button>
    <button class="action-btn" id="btnClear"><span class="icon">🗑️</span><span class="text">Tümünü Temizle</span></button>
  </div>

  <!-- DOSYALAR -->
  <h2 class="section-title">🗂️ Dosyaların</h2>
  <div class="file-grid" id="fileGrid">
    <!-- Dosyalar JS ile buraya gerçek boyutlarıyla eklenecek -->
  </div>
</main>

<!-- Gizli Dosya Seçici -->
<input type="file" id="fileInput" multiple />

<div class="toast" id="toast">✅ İşlem başarılı!</div>

<script>
  // ==========================================================
  // 1. GERÇEK VERİTABANI (IndexedDB) YÖNETİMİ
  // ==========================================================
  const DB_NAME = 'NovaDepoDB';
  const STORE_NAME = 'files';
  const MAX_STORAGE = 10 * 1024 * 1024 * 1024; // 10 GB Görsel Limit

  function initDB() {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(DB_NAME, 1);
      request.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(STORE_NAME)) {
          db.createObjectStore(STORE_NAME, { keyPath: 'id' });
        }
      };
      request.onsuccess = (e) => resolve(e.target.result);
      request.onerror = (e) => reject(e.target.error);
    });
  }

  async function dbAdd(record) {
    const db = await initDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).put(record);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }

  async function dbGetAll() {
    const db = await initDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readonly');
      const req = tx.objectStore(STORE_NAME).getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = (e) => reject(e.target.error);
    });
  }

  async function dbDelete(id) {
    const db = await initDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).delete(id);
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }

  async function dbClear() {
    const db = await initDB();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(STORE_NAME, 'readwrite');
      tx.objectStore(STORE_NAME).clear();
      tx.oncomplete = () => resolve();
      tx.onerror = (e) => reject(e.target.error);
    });
  }

  async function seedDefaults() {
    const existing = await dbGetAll();
    if (existing.length === 0) {
      const defaults = [
        { id: 'def1', name: 'Projeler', type: 'folder', size: 0, date: new Date().toLocaleDateString('tr-TR'), isFolder: true },
        { id: 'def2', name: 'uzay.jpg', type: 'image/jpeg', size: 5347200, date: new Date().toLocaleDateString('tr-TR'), isFolder: false, blob: null },
        { id: 'def3', name: 'rapor.pdf', type: 'application/pdf', size: 2516582, date: new Date().toLocaleDateString('tr-TR'), isFolder: false, blob: null }
      ];
      for (const f of defaults) await dbAdd(f);
    }
  }

  // ==========================================================
  // 2. ARAYÜZ VE İŞLEVLER
  // ==========================================================
  function formatBytes(bytes, decimals = 2) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const dm = decimals < 0 ? 0 : decimals;
    const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
  }

  function getFileIcon(type, name, isFolder) {
    if (isFolder) return '📁';
    if (type.includes('image') || name.match(/\.(jpg|jpeg|png|gif|webp)$/i)) return '🖼️';
    if (type.includes('video') || name.match(/\.(mp4|mkv|avi|mov)$/i)) return '🎬';
    if (type.includes('pdf') || name.match(/\.pdf$/i)) return '📄';
    if (name.match(/\.(xlsx|csv|xls)$/i)) return '📊';
    if (name.match(/\.(zip|rar|7z)$/i)) return '📦';
    return '📄';
  }

  let currentSortAsc = true;
  let currentFilter = '';

  async function refreshAll() {
    const allFiles = await dbGetAll();
    
    // Filtreleme
    let filtered = allFiles.filter(f => f.name.toLowerCase().includes(currentFilter.toLowerCase()));
    
    // Sıralama (Klasörler her zaman üstte)
    filtered.sort((a, b) => {
      if (a.isFolder && !b.isFolder) return -1;
      if (!a.isFolder && b.isFolder) return 1;
      return currentSortAsc ? a.name.localeCompare(b.name, 'tr') : b.name.localeCompare(a.name, 'tr');
    });

    // Depolama Hesaplama
    const totalUsed = allFiles.reduce((acc, f) => acc + (f.size || 0), 0);
    const percent = Math.min((totalUsed / MAX_STORAGE) * 100, 100);
    
    document.getElementById('storageValue').innerHTML = `${formatBytes(totalUsed)} <span>/ ${formatBytes(MAX_STORAGE)} kullanıldı</span>`;
    document.getElementById('progressFill').style.width = `${percent}%`;
    document.getElementById('storagePercent').textContent = `%${Math.round(percent)}`;
    document.getElementById('storageRing').style.background = `conic-gradient(var(--primary) 0% ${percent}%, rgba(255,255,255,0.1) ${percent}% 100%)`;

    // Izgara Render
    const grid = document.getElementById('fileGrid');
    grid.innerHTML = '';
    
    if (filtered.length === 0) {
      grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px;">Hiçbir öğe bulunamadı.</div>`;
      return;
    }

    filtered.forEach(file => {
      const card = document.createElement('div');
      card.className = 'file-card';
      card.innerHTML = `
        <button class="delete-btn" data-id="${file.id}" title="Kalıcı Olarak Sil">🗑️</button>
        ${file.isFolder ? '<span class="badge">Klasör</span>' : ''}
        <span class="file-icon">${getFileIcon(file.type, file.name, file.isFolder)}</span>
        <div class="file-name">${file.name}</div>
        <div class="file-meta">${file.isFolder ? 'Klasör' : formatBytes(file.size)} • ${file.date}</div>
      `;
      
      card.addEventListener('click', async (e) => {
        if (e.target.closest('.delete-btn')) return;
        
        if (file.isFolder) {
          showToast(`📁 "${file.name}" klasörü. (Gerçek dosya yükleyerek indirme testini yapabilirsiniz)`);
          return;
        }

        if (!file.blob) {
          showToast('⚠️ Bu örnek dosyanın içeriği yoktur, sadece demo amaçlıdır.', true);
          return;
        }

        showToast('⏳ Dosya hazırlanıyor, indiriliyor...');
        try {
          const url = URL.createObjectURL(file.blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = file.name;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          showToast('✅ İndirme başladı!');
        } catch (err) {
          showToast('⚠️ İndirme sırasında hata oluştu!', true);
        }
      });

      grid.appendChild(card);
    });

    // Silme butonları
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        if (confirm('Bu öğeyi kalıcı olarak silmek istediğinize emin misiniz?')) {
          try {
            await dbDelete(id);
            showToast('🗑️ Öğe kalıcı olarak silindi ve alan geri kazanıldı.');
            refreshAll();
          } catch (err) {
            showToast('⚠️ Silme işlemi başarısız!', true);
          }
        }
      });
    });
  }

  // ==========================================================
  // 3. ETKİLEŞİM OLAYLARI
  // ==========================================================
  
  // Dosya Yükleme
  const fileInput = document.getElementById('fileInput');
  document.getElementById('btnUpload').addEventListener('click', () => fileInput.click());
  
  fileInput.addEventListener('change', async (e) => {
    const newFiles = Array.from(e.target.files);
    if (newFiles.length === 0) return;

    document.getElementById('loadingOverlay').classList.add('active');
    try {
      for (const file of newFiles) {
        await dbAdd({
          id: Date.now() + Math.random().toString(36).substr(2, 9),
          name: file.name,
          type: file.type || 'unknown',
          size: file.size,
          date: new Date().toLocaleDateString('tr-TR'),
          isFolder: false,
          blob: file // GERÇEK DOSYA NESNESİ
        });
      }
      showToast(`✅ ${newFiles.length} dosya başarıyla depolandı!`);
      fileInput.value = '';
      await refreshAll();
    } catch (err) {
      if (err.name === 'QuotaExceededError') {
        showToast('⚠️ Tarayıcı depolama kotası doldu! Bazı dosyaları silin.', true);
      } else {
        showToast('⚠️ Yükleme hatası: ' + err.message, true);
      }
    } finally {
      document.getElementById('loadingOverlay').classList.remove('active');
    }
  });

  // Sürükle & Bırak
  const dropZone = document.getElementById('dropZone');
  ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropZone.addEventListener(eventName, (e) => { e.preventDefault(); e.stopPropagation(); }, false);
  });
  dropZone.addEventListener('dragover', () => dropZone.classList.add('drag-over'));
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', async (e) => {
    dropZone.classList.remove('drag-over');
    const newFiles = Array.from(e.dataTransfer.files);
    if (newFiles.length > 0) {
      document.getElementById('loadingOverlay').classList.add('active');
      try {
        for (const file of newFiles) {
          await dbAdd({
            id: Date.now() + Math.random().toString(36).substr(2, 9),
            name: file.name,
            type: file.type || 'unknown',
            size: file.size,
            date: new Date().toLocaleDateString('tr-TR'),
            isFolder: false,
            blob: file
          });
        }
        showToast(`✅ ${newFiles.length} dosya başarıyla depolandı!`);
        await refreshAll();
      } catch (err) {
        showToast('⚠️ Yükleme hatası!', true);
      } finally {
        document.getElementById('loadingOverlay').classList.remove('active');
      }
    }
  });

  // Yeni Klasör
  document.getElementById('btnFolder').addEventListener('click', async () => {
    const name = prompt('Yeni klasör adı:');
    if (name && name.trim() !== '') {
      const allFiles = await dbGetAll();
      if (allFiles.some(f => f.name.toLowerCase() === name.trim().toLowerCase())) {
        showToast('⚠️ Bu isimde bir klasör zaten var!', true);
        return;
      }
      await dbAdd({
        id: Date.now().toString(),
        name: name.trim(),
        type: 'folder',
        size: 0,
        date: new Date().toLocaleDateString('tr-TR'),
        isFolder: true
      });
      showToast('📁 Yeni klasör oluşturuldu!');
      refreshAll();
    }
  });

  // Sıralama
  document.getElementById('btnSort').addEventListener('click', () => {
    currentSortAsc = !currentSortAsc;
    refreshAll();
    showToast(`🔃 Dosyalar ${currentSortAsc ? 'A-Z' : 'Z-A'} sıralandı.`);
  });

  // Tümünü Temizle
  document.getElementById('btnClear').addEventListener('click', async () => {
    if (confirm('DİKKAT: Tüm dosya ve klasörler kalıcı olarak silinecek. Onaylıyor musunuz?')) {
      try {
        await dbClear();
        showToast('🗑️ Tüm depolama alanı temizlendi.');
        refreshAll();
      } catch (err) {
        showToast('⚠️ Temizleme başarısız!', true);
      }
    }
  });

  // Arama
  document.getElementById('searchInput').addEventListener('input', (e) => {
    currentFilter = e.target.value;
    refreshAll();
  });

  // ==========================================================
  // 4. OTURUM VE GÜVENLİK
  // ==========================================================
  (function guard() {
    let user = null;
    try { user = JSON.parse(localStorage.getItem('novaUser')); } catch (e) { user = null; }
    if (!user) {
      window.location.replace('../');
      return;
    }
    const name = user.name || 'Kaptan';
    document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('userName').textContent = name;
    document.getElementById('welcomeName').textContent = name;
  })();

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('novaUser');
    showToast('👋 Çıkış yapıldı. Görüşürüz!');
    setTimeout(() => { window.location.replace('../'); }, 800);
  });

  function showToast(message, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show' + (isError ? ' error' : '');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.className = 'toast', 3000);
  }

  // Başlangıç
  (async () => {
    await seedDefaults();
    refreshAll();
  })();


  // ==========================================================
  // 5. AŞIRI GERÇEKÇİ GALAKSİ ANİMASYONU (CANVAS)
  // ==========================================================
  const canvas = document.getElementById('galaxy-canvas');
  const ctx = canvas.getContext('2d');
  let width, height, cx, cy;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    cx = width / 2;
    cy = height / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  const ARMS = 3;
  const PARTICLES_PER_ARM = 600;
  const CORE_PARTICLES = 400;
  const particles = [];

  class Star {
    constructor(isCore = false) {
      this.isCore = isCore;
      this.reset();
    }
    reset() {
      if (this.isCore) {
        this.radius = Math.random() * 40;
        this.angle = Math.random() * Math.PI * 2;
        this.size = Math.random() * 1.5 + 0.5;
        this.color = `hsl(${Math.random() * 60 + 30}, 100%, ${Math.random() * 30 + 70}%)`;
        this.speed = 0.02 + Math.random() * 0.03;
      } else {
        const arm = Math.floor(Math.random() * ARMS);
        const armAngle = (arm / ARMS) * Math.PI * 2;
        this.radius = 50 + Math.random() * (Math.min(width, height) * 0.45);
        const spiralOffset = (this.radius * 0.015); 
        this.angle = armAngle + spiralOffset + (Math.random() - 0.5) * 0.8;
        this.size = Math.random() * 1.8 + 0.3;
        const hue = 200 + (this.radius / (Math.min(width, height) * 0.45)) * 100; 
        this.color = `hsl(${hue}, 80%, ${Math.random() * 30 + 60}%)`;
        this.speed = 50 / (this.radius * this.radius + 100) + 0.002;
      }
      this.opacity = Math.random() * 0.5 + 0.5;
      this.twinkleSpeed = Math.random() * 0.05 + 0.01;
      this.twinklePhase = Math.random() * Math.PI * 2;
    }
    update() {
      this.angle += this.speed;
      this.twinklePhase += this.twinkleSpeed;
      this.currentOpacity = this.opacity * (0.7 + 0.3 * Math.sin(this.twinklePhase));
    }
    draw() {
      const x = cx + Math.cos(this.angle) * this.radius;
      const y = cy + Math.sin(this.angle) * this.radius * 0.45;
      const distToCenter = Math.sqrt((x-cx)**2 + (y-cy)**2);
      const fade = Math.max(0, 1 - distToCenter / (Math.min(width, height) * 0.55));

      ctx.beginPath();
      ctx.arc(x, y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.globalAlpha = this.currentOpacity * fade;
      ctx.fill();
      
      if (this.isCore && this.size > 1.2) {
        ctx.beginPath();
        ctx.arc(x, y, this.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = 0.1 * fade;
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;
    }
  }

  for (let i = 0; i < CORE_PARTICLES; i++) particles.push(new Star(true));
  for (let i = 0; i < ARMS * PARTICLES_PER_ARM; i++) particles.push(new Star(false));

  let mouseX = cx, mouseY = cy;
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });

  let time = 0;
  function animate() {
    ctx.fillStyle = 'rgba(2, 0, 20, 0.25)';
    ctx.fillRect(0, 0, width, height);

    time += 0.005;
    const glowSize = 120 + Math.sin(time) * 10;
    const gradient = ctx.createRadialGradient(cx, cy, 10, cx, cy, glowSize);
    gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
    gradient.addColorStop(0.2, 'rgba(139, 92, 246, 0.6)');
    gradient.addColorStop(0.5, 'rgba(6, 182, 212, 0.2)');
    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
    
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(cx, cy, glowSize, 0, Math.PI * 2);
    ctx.fill();

    const offsetX = (mouseX - cx) * 0.02;
    const offsetY = (mouseY - cy) * 0.02;
    ctx.save();
    ctx.translate(offsetX, offsetY);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    ctx.restore();
    ctx.globalCompositeOperation = 'source-over';
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
